<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <!-- Background -->
  <rect width="32" height="32" fill="#1A1A1A"/>

  <!-- Comb: 3 red bumps + base -->
  <rect x="4"  y="2" width="5" height="6" fill="#E52521"/>
  <rect x="12" y="0" width="8" height="8" fill="#E52521"/>
  <rect x="23" y="2" width="5" height="6" fill="#E52521"/>
  <rect x="4"  y="6" width="24" height="3" fill="#E52521"/>

  <!-- Face outer border -->
  <rect x="3" y="9" width="26" height="22" fill="#000000"/>

  <!-- Face fill -->
  <rect x="5" y="11" width="22" height="18" fill="#FFFDE0"/>

  <!-- Eyes -->
  <rect x="7"  y="14" width="4" height="4" fill="#000000"/>
  <rect x="21" y="14" width="4" height="4" fill="#000000"/>
  <!-- Eye highlights -->
  <rect x="7"  y="14" width="1" height="1" fill="#FFFFFF"/>
  <rect x="21" y="14" width="1" height="1" fill="#FFFFFF"/>

  <!-- Beak (orange, pointing down) -->
  <rect x="11" y="20" width="10" height="2" fill="#FF8C00"/>
  <rect x="12" y="22" width="8"  height="2" fill="#FF8C00"/>
  <rect x="13" y="24" width="6"  height="2" fill="#FF8C00"/>

  <!-- Wattle -->
  <rect x="12" y="26" width="8" height="3" fill="#E52521"/>
</svg>
